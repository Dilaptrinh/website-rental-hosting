spring.application.name=web-rental
server.port=8081

# MySQL Configuration (Mặc định nối tên container mysql-db trong Docker, có fallback local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-db:3306/web_rental?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Lấy từ biến môi trường, có giá trị mặc định)
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-256-bits-long}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}

# Google OAuth2 Configuration (Redirect chuẩn về tên miền mới)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:https://hosting.duycode.id.vn}/login/oauth2/code/google

app.oauth2.redirect-uri=${APP_FRONTEND_URL:https://hosting.duycode.id.vn}/oauth2/callback

# Default Super Admin
app.super-admin.email=${SUPER_ADMIN_EMAIL:superadmin@web-rental.com}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:SuperAdmin@123}
app.super-admin.full-name=Super Admin

# MoMo Payment (Sandbox) - Callback chuẩn về tên miền mới
payment.momo.partner-code=${MOMO_PARTNER_CODE}
payment.momo.access-key=${MOMO_ACCESS_KEY}
payment.momo.secret-key=${MOMO_SECRET_KEY}
payment.momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
payment.momo.notify-url=${APP_BASE_URL:https://hosting.duycode.id.vn}/api/v1/payments/momo/ipn
payment.momo.return-url=${APP_FRONTEND_URL:https://hosting.duycode.id.vn}/payment/callback